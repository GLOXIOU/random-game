<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Game Selector</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <header>
            <div class="logo">RANDOM GAME</div>
            <p>Comparez vos bibliothèques et jouez ensemble.</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <i class="fa-brands fa-steam"></i>
                <input type="text" id="usernameInput" placeholder="Pseudo Steam..." autocomplete="off">
                <button id="addUserBtn">OK</button>
            </div>
        </section>

        <div id="usersContainer" class="users-grid"></div>

        <section class="common-games-section">
            <div class="section-header">
                <h2><i class="fa-solid fa-layer-group"></i> Jeux en commun</h2>
                <span id="commonCount" class="badge">0</span>
            </div>
            
            <div class="common-games-wrapper">
                <div id="commonGamesList" class="games-list">
                    <div class="empty-state">Ajoutez des joueurs pour voir les jeux communs...</div>
                </div>
                <button id="addManualGameBtn" class="btn-dashed">
                    <i class="fa-solid fa-plus"></i> Ajouter un jeu externe
                </button>
            </div>
        </section>

        <section class="action-section">
            <button id="randomizeBtn" class="btn-primary" disabled>
                <i class="fa-solid fa-dice"></i> TROUVER UN JEU
            </button>
        </section>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-header">
                <span>Sélection aléatoire</span>
                <button id="closeModal">&times;</button>
            </div>
            <div class="game-reveal">
                <div class="icon-box">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                <h2 id="winnerText">Nom du Jeu</h2>
            </div>
            <div class="confetti-container">
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
            </div>
            <button class="btn-restart" onclick="window.location.reload()">RECOMMENCER</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
